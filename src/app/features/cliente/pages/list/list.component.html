<p-table
  #tabela
  [value]="dados2"
  [lazy]="true"
  (onLazyLoad)="carregar($event)"
  [paginator]="true"
  [rows]="10"
  [totalRecords]="total"
  [loading]="loading"
  [rowsPerPageOptions]="[10, 20, 50]"
  responsiveLayout="scroll"
  [showCurrentPageReport]="true"
  currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords}"
>
  <!-- HEADER -->
  <ng-template pTemplate="header">
    <tr>
      <th pSortableColumn="contaBancariaId">
        ID <p-sortIcon field="contaBancariaId"></p-sortIcon>
      </th>

      <th pSortableColumn="descricao">
        Nome <p-sortIcon field="descricao"></p-sortIcon>
      </th>

      <th>Status</th>
      <th>Cadastro</th>
      <th>Ações</th>
    </tr>
  </ng-template>

  <!-- BODY -->
  <ng-template pTemplate="body" let-item>
    <tr>
      <td>{{ item.id }}</td>
      <td>{{ item.nome }}</td>

      <td>
        <p-tag
          [value]="item.ativo === 'ATIVO' ? 'Ativo' : 'Inativo'"
          [severity]="item.ativo === 'ATIVO' ? 'success' : 'danger'"
        />
      </td>

      <td>{{ item.dataCadastro | date: "dd/MM/yyyy HH:mm" }}</td>
      <td class="flex gap-2">
        <p-button
          icon="pi pi-pencil"
          severity="secondary"
          rounded

        >
        </p-button>

        <p-button
          icon="pi pi-trash"
          severity="danger"
          rounded
        >
        </p-button>
      </td>
    </tr>
  </ng-template>
</p-table>
