name: Deploy Kubernetes

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão'
        required: true
        default: 'latest'

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: self-hosted

    env:
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Definir variáveis
        run: |
          APP_NAME=$(basename $GITHUB_REPOSITORY)
          IMAGE=ghcr.io/${{ github.repository }}:${{ github.event.inputs.version }}

          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Build
        run: docker build -t $IMAGE .

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push
        run: docker push $IMAGE

      # 🔥 AQUI É O CORAÇÃO DECLARATIVO
      - name: Deploy declarativo
        run: |
          cd k8s/overlays/prod

          # nome dinâmico
          kustomize edit set nameprefix ${APP_NAME}-

          # imagem dinâmica
          kustomize edit set image IMAGE_PLACEHOLDER=$IMAGE

          # domínio dinâmico
          sed -i "s/app.cluster/${APP_NAME}.cluster/g" ingress.yml

          kubectl apply -k .