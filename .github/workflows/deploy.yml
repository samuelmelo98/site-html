name: Deploy Kubernetes

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:

  deploy:

    runs-on: self-hosted

    env:
      KUBECONFIG: /home/samuel-admin/.kube/config
      IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t $IMAGE .

      - name: Login GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: |
          docker push $IMAGE

      - name: Update deployment
        run: |
          kubectl set image deployment/app app=$IMAGE -n prod
          kubectl rollout status deployment/app -n prod