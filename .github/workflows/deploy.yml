name: Deploy Kubernetes

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão da imagem'
        required: true
        default: 'latest'

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: self-hosted

    env:
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Definir variáveis
        run: |
          APP_NAME=$(basename $GITHUB_REPOSITORY)
          IMAGE=ghcr.io/${{ github.repository }}:${{ github.event.inputs.version }}

          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Build image
        run: docker build -t $IMAGE .

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: docker push $IMAGE

      - name: Deploy
        run: |
          echo "Deployando $APP_NAME"

          if kubectl get deployment ${APP_NAME}-app -n prod > /dev/null 2>&1; then
            echo "Atualizando deployment existente"
            kubectl set image deployment/${APP_NAME}-app app=$IMAGE -n prod
          else
            echo "Criando novo deployment"

            kubectl create deployment ${APP_NAME}-app \
              --image=$IMAGE \
              -n prod

            kubectl expose deployment ${APP_NAME}-app \
              --port=80 \
              --target-port=80 \
              -n prod

            cat <<EOF | kubectl apply -f -
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${APP_NAME}-app
  namespace: prod
spec:
  rules:
    - host: ${APP_NAME}.cluster.stringtecnologiadf.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ${APP_NAME}-app
                port:
                  number: 80
EOF
          fi

          kubectl rollout status deployment/${APP_NAME}-app -n prod