name: Deploy Kubernetes

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão da imagem (ex: v1.0.0)'
        required: true
        default: 'latest'

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: self-hosted

    env:
      KUBECONFIG: /home/samuel-admin/.kube/config

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Definir variáveis
        run: |
          APP_NAME=$(basename $GITHUB_REPOSITORY)
          IMAGE=ghcr.io/${{ github.repository }}:${{ github.event.inputs.version }}

          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Build image
        run: |
          docker build -t $IMAGE .

      - name: Login GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: |
          docker push $IMAGE

      - name: Deploy no Kubernetes
        run: |
          kubectl set image deployment/${APP_NAME}-app app=$IMAGE -n prod
          kubectl rollout status deployment/${APP_NAME}-app -n prod