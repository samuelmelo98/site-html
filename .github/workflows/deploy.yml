name: Deploy Kubernetes

on:
  push:
    branches:
      - main

jobs:

  deploy:
    runs-on: self-hosted

    env:
      KUBECONFIG: /home/samuel-admin/.kube/config

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:latest .

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository }}:latest

      - name: Clone infra repo
        run: |
          git clone https://github.com/samuelmelo98/app-cluster.git

      - name: Prepare manifests
        run: |
          APP_NAME=site-html
          IMAGE=ghcr.io/${{ github.repository }}:latest

          sed -i "s|IMAGE_PLACEHOLDER|${IMAGE}|g" app-cluster/k8s/base/deployment.yml

      - name: Deploy
        run: |
          kubectl apply -k app-cluster/k8s/overlays/prod -n prod
